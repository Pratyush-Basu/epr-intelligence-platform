<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="GreenPack Industries — AI-Powered EPR Compliance Management System. Manage plastic waste declarations, reconciliation, and compliance Q&A locally." />
    <title>GreenPack EPR | {{ page_title }}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Custom CSS -->
    <link href="/static/css/custom.css" rel="stylesheet" />
</head>

<body>

    <!-- =========================================================== -->
    <!-- NAVBAR                                                       -->
    <!-- =========================================================== -->
    <nav class="navbar navbar-expand-lg navbar-dark gp-navbar sticky-top">
        <div class="container-xl">

            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <div class="brand-icon">
                    <i class="bi bi-recycle fs-5"></i>
                </div>
                <div>
                    <span class="fw-700 text-white">GreenPack</span>
                    <span class="badge badge-epr ms-1">EPR</span>
                </div>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto ms-4 gap-1">
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if page_title == 'Dashboard' %}active{% endif %}" href="/">
                            <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if page_title == 'Submit Declaration' %}active{% endif %}"
                            href="/declare">
                            <i class="bi bi-file-earmark-plus me-1"></i>Declare
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if page_title == 'Reconciliation Summary' %}active{% endif %}"
                            href="/summary">
                            <i class="bi bi-bar-chart-line me-1"></i>Summary
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if page_title == 'EPR Compliance Assistant' %}active{% endif %}"
                            href="/ask">
                            <i class="bi bi-chat-dots me-1"></i>Ask AI
                        </a>
                    </li>
                </ul>

                <!-- Health indicator -->
                <div class="d-flex align-items-center gap-3">
                    <span id="healthDot" class="health-dot health-checking" title="Checking system health..."></span>
                    <a href="/docs" target="_blank" class="btn btn-sm btn-outline-light rounded-pill px-3">
                        <i class="bi bi-book me-1"></i>API Docs
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- =========================================================== -->
    <!-- MAIN CONTENT                                                 -->
    <!-- =========================================================== -->
    <main class="container-xl py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- =========================================================== -->
    <!-- TOAST CONTAINER                                              -->
    <!-- =========================================================== -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:9999"></div>

    <!-- =========================================================== -->
    <!-- FOOTER                                                       -->
    <!-- =========================================================== -->
    <footer class="gp-footer mt-auto py-3">
        <div class="container-xl">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <span class="text-muted small">
                        © 2026 GreenPack Industries Ltd. · EPR Compliance System v1.0
                    </span>
                </div>
                <div class="col-md-6 text-md-end">
                    <span class="text-muted small">
                        <i class="bi bi-cpu me-1"></i>Powered by Groq AI · Ollama · FAISS · sentence-transformers
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/charts.js"></script>

    <script>
        // =========================================================
        // Global Utilities
        // =========================================================

        /** Show a Bootstrap toast notification */
        function showToast(message, type = 'success') {
            const id = 'toast_' + Date.now();
            const icons = { success: 'bi-check-circle-fill', danger: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill' };
            const html = `
        <div id="${id}" class="toast align-items-center text-bg-${type} border-0 shadow" role="alert" aria-live="assertive">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi ${icons[type] || icons.info}"></i>
                    <span>${message}</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>`;
            document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
            const el = document.getElementById(id);
            const toast = new bootstrap.Toast(el, { delay: 4000 });
            toast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }

        /** Set button loading state */
        function setLoading(btn, loading, originalText) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Processing...`;
            } else {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // =========================================================
        // Health check on every page load
        // =========================================================
        async function checkHealth() {
            const dot = document.getElementById('healthDot');
            try {
                const res = await fetch('/health');
                const data = await res.json();
                dot.className = 'health-dot';
                if (data.status === 'ok') {
                    dot.classList.add('health-ok');
                    dot.title = `System healthy — DB: ${data.database}, Ollama: ${data.ollama}, FAISS: ${data.faiss} (${data.faiss_chunks} chunks)`;
                } else {
                    dot.classList.add('health-degraded');
                    dot.title = `System degraded — DB: ${data.database}, Ollama: ${data.ollama}, FAISS: ${data.faiss}`;
                }
            } catch {
                dot.className = 'health-dot health-error';
                dot.title = 'Health check failed — server may be unreachable';
            }
        }
        checkHealth();
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
